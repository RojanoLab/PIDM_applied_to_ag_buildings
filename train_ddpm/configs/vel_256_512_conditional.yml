data:
    dataset: "velocities"
    data_dir_x: "../data/train_Vel_X.npy"
    stat_path_x: "../data/train_256-512_Vel_X_stats.npz"
    data_dir_y: "../data/train_Vel_Y.npy"
    stat_path_y: "../data/train_256-512_Vel_Y_stats.npz"
    data_dir_ke: "../data/mean_ke.npz"                     # Kinetic energy npz file

    image_size: [512,256]
    channels: 3
    logit_transform: false
    uniform_dequantization: false
    gaussian_dequantization: false
    random_flip: false
    rescaled: false
    num_workers: 4

model:
    type: "conditional"
    in_channels: 3
    out_ch: 3
    ch: 64
    ch_mult: [1, 1, 1, 2]
    num_res_blocks: 1
    attn_resolutions: [16, ]
    dropout: 0.1
    var_type: fixedlarge
    ema_rate: 0.9999
    ema: True
    resamp_with_conv: True

diffusion:
    beta_schedule: linear
    beta_start: 0.0001
    beta_end: 0.02
    num_diffusion_timesteps: 1000 # Might need to be changed to 500 later to match SDEdit

training:
    batch_size: 12
    n_epochs: 1000 # 600 epoch for about 12 hours
    n_iters: 200000
    snapshot_freq: 20000
    validation_freq: 2000

sampling:
    batch_size: 12
    last_only: True

optim:
    weight_decay: 0.000
    optimizer: "Adam"
    lr: 0.0002
    beta1: 0.9
    amsgrad: false
    eps: 0.00000001
    grad_clip: 1.0